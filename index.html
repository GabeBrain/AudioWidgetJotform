<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Widget de Gravacao de Audio</title>
  <script>
    // Endpoint seguro que gera URL assinada de upload no Supabase
    // Exemplo esperado de resposta: { uploadUrl, publicUrl }
    const SIGNED_UPLOAD_ENDPOINT = 'https://egrwllnuutoxjexqkrjv.supabase.co/functions/v1/audio-uploader';
  </script>

  <!-- 1. Declaracao ANTES do script do Jotform -->
  <script>
    let mediaRecorder;
    let audioChunks = [];
    let latestAudioUrl = '';
    let isUploading = false;
    let widgetInitialized = false;
    let widgetSubscriptionsRegistered = false;
    let controlsInitialized = false;
    let isRecording = false;
    let activeStream = null;
    let recordingFinalizationPromise = null;
    let submitInProgress = false;
    let pendingSendDataPayload = null;
    let recordedMimeType = 'audio/webm';
    let recordedFileExtension = 'webm';
    let locationPermissionState = 'pending';
    let microphonePermissionState = 'pending';
    let isJotformAppRuntime = false;
    let appInitPermissionRecheckDone = false;
    let hasRecordingStarted = false;
    let recordingStartedAtMs = 0;
    let recordingStartedAtIso = '';
    let currentRecordingId = '';
    let activeRecordingAccumulatedMs = 0;
    let activeRecordingSegmentStartedAtMs = 0;
    let recordingPauseCount = 0;
    let recordingResumeCount = 0;
    let latestAudioPayload = null;
    let widgetRequiresAudio = false;
    let widgetRequiredTemporarilyDisabled = false;
    let widgetFormId = '';

    const RECORDER_TARGET_BITRATE = 96000;
    const RECORDER_TIMESLICE_MS = 1000;
    const PAYLOAD_VERSION = 3;
    const TRACKER_DURATION_TOLERANCE_MS = 2000;
    const TRACKER_DURATION_TOLERANCE_PCT = 10;
    const TRACKER_FLAG_TYPES = Object.freeze(['duvida', 'erro', 'risco', 'followup', 'insight']);
    const TRACKER_SEVERITY_LEVELS = Object.freeze(['low', 'medium', 'high']);
    const TRACKER_STATUS_VALUES = Object.freeze(['open', 'in_review', 'resolved']);
    const WIDGET_VALUE_FORMAT = 'json';
    const FORCE_WIDGET_REQUIRED_AT_RUNTIME = false;
    const SHOW_PERMISSION_DEBUG_INFO = false;
    const SHOW_STATUS_MESSAGES = false;
    const ENABLE_APP_INIT_PERMISSION_RECHECK = true;
    const LOCATION_PERMISSION_TIMEOUT_MS = 3200;
    const LOCATION_PERMISSION_MAX_AGE_MS = 15 * 60 * 1000;
    const LOCATION_PERMISSION_BOOT_MAX_AGE_MS = 24 * 60 * 60 * 1000;
    const permissionStateMeta = {
      location: { source: 'boot', detail: 'init' },
      microphone: { source: 'boot', detail: 'init' }
    };
    const MOBILE_AUDIO_CONSTRAINTS = {
      channelCount: { ideal: 1 },
      sampleRate: { ideal: 48000 },
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    };

    const logInfo = (...args) => console.log('[WidgetAudio]', ...args);
    const logError = (...args) => console.error('[WidgetAudio]', ...args);

    logInfo('Script inicializado.');

    function setStatus(message, tone = 'neutral') {
      const statusText = document.getElementById('status-text');
      const statusCard = document.getElementById('status-card');
      const hasMessage = typeof message === 'string' && message.trim().length > 0;
      if (!SHOW_STATUS_MESSAGES) {
        requestWidgetResize();
        return;
      }

      if (statusText) {
        statusText.textContent = message;
      }

      if (statusCard) {
        statusCard.setAttribute('data-tone', tone);
        statusCard.classList.toggle('hidden', !hasMessage);
      }
      requestWidgetResize();
    }

    function requestWidgetResize() {
      if (!window.JFCustomWidget?.requestFrameResize) return;
      try {
        window.JFCustomWidget.requestFrameResize();
      } catch (_) {}
    }

    function safeParseJson(rawValue) {
      if (!rawValue || typeof rawValue !== 'string') return null;
      const trimmed = rawValue.trim();
      if (!trimmed.startsWith('{') || !trimmed.endsWith('}')) return null;
      try {
        return JSON.parse(trimmed);
      } catch (_) {
        return null;
      }
    }

    function parseIncomingWidgetValue(rawValue) {
      if (!rawValue || typeof rawValue !== 'string') {
        return { rawValue: '', payload: null, audioUrl: '' };
      }

      const parsed = safeParseJson(rawValue);
      if (parsed && typeof parsed === 'object') {
        const audioUrl = typeof parsed.audioUrl === 'string' ? parsed.audioUrl : '';
        return {
          rawValue,
          payload: parsed,
          audioUrl
        };
      }

      return { rawValue, payload: null, audioUrl: rawValue };
    }

    function normalizeFormIdValue(value) {
      if (value === null || value === undefined) return '';
      const normalized = String(value).trim();
      return normalized || '';
    }

    function extractFormIdFromObject(value) {
      if (!value || typeof value !== 'object') return '';

      const directKeys = ['formID', 'formId', 'form_id'];
      for (const key of directKeys) {
        const normalized = normalizeFormIdValue(value[key]);
        if (normalized) return normalized;
      }

      const nestedKeys = ['form', 'data', 'payload', 'params', 'settings', 'config', 'widget', 'context'];
      for (const key of nestedKeys) {
        const nested = value[key];
        if (!nested || typeof nested !== 'object') continue;
        for (const nestedKey of directKeys) {
          const normalized = normalizeFormIdValue(nested[nestedKey]);
          if (normalized) return normalized;
        }
      }

      return '';
    }

    function extractFormIdFromSearch(searchValue) {
      if (typeof searchValue !== 'string' || !searchValue.trim()) return '';
      const normalizedSearch = searchValue.startsWith('?') ? searchValue.slice(1) : searchValue;
      const params = new URLSearchParams(normalizedSearch);
      const keys = ['formID', 'formId', 'form_id'];
      for (const key of keys) {
        const normalized = normalizeFormIdValue(params.get(key));
        if (normalized) return normalized;
      }
      return '';
    }

    function resolveWidgetFormId(readyPayload = {}) {
      const fromReadyPayload = extractFormIdFromObject(readyPayload);
      if (fromReadyPayload) return fromReadyPayload;

      const fromSearch = extractFormIdFromSearch(window?.location?.search || '');
      if (fromSearch) return fromSearch;

      return '';
    }

    function createRecordingId() {
      if (window.crypto?.randomUUID) {
        return window.crypto.randomUUID();
      }
      const randomChunk = Math.random().toString(36).slice(2, 10);
      return `rec-${Date.now()}-${randomChunk}`;
    }

    function normalizeDurationMs(value) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return null;
      return Math.max(0, Math.trunc(value));
    }

    function roundTo2(value) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return 0;
      return Math.round(value * 100) / 100;
    }

    function resetRecordingRuntimeState() {
      audioChunks = [];
      recordingStartedAtMs = 0;
      recordingStartedAtIso = '';
      currentRecordingId = '';
      activeRecordingAccumulatedMs = 0;
      activeRecordingSegmentStartedAtMs = 0;
      recordingPauseCount = 0;
      recordingResumeCount = 0;
    }

    function openActiveRecordingSegment(startedAtMs) {
      if (!Number.isFinite(startedAtMs) || startedAtMs <= 0) return;
      if (activeRecordingSegmentStartedAtMs > 0) return;
      activeRecordingSegmentStartedAtMs = startedAtMs;
    }

    function closeActiveRecordingSegment(endedAtMs) {
      if (!Number.isFinite(endedAtMs) || endedAtMs <= 0) return normalizeDurationMs(activeRecordingAccumulatedMs) || 0;
      if (activeRecordingSegmentStartedAtMs > 0) {
        activeRecordingAccumulatedMs += Math.max(0, endedAtMs - activeRecordingSegmentStartedAtMs);
        activeRecordingSegmentStartedAtMs = 0;
      }
      return normalizeDurationMs(activeRecordingAccumulatedMs) || 0;
    }

    async function getBlobDurationFromMediaElement(blob, timeoutMs = 8000) {
      if (!(blob instanceof Blob) || blob.size <= 0) return null;
      return new Promise((resolve) => {
        const objectUrl = URL.createObjectURL(blob);
        const audio = document.createElement('audio');
        let resolved = false;
        const timer = setTimeout(() => finish(null), timeoutMs);

        function finish(value) {
          if (resolved) return;
          resolved = true;
          clearTimeout(timer);
          audio.onloadedmetadata = null;
          audio.onerror = null;
          try {
            audio.removeAttribute('src');
            audio.load();
          } catch (_) {}
          URL.revokeObjectURL(objectUrl);
          resolve(normalizeDurationMs(value));
        }

        audio.preload = 'metadata';
        audio.onloadedmetadata = () => {
          const durationSeconds = Number(audio.duration);
          if (Number.isFinite(durationSeconds) && durationSeconds > 0) {
            finish(durationSeconds * 1000);
            return;
          }
          finish(null);
        };
        audio.onerror = () => finish(null);
        audio.src = objectUrl;
      });
    }

    async function getBlobDurationFromAudioContext(blob) {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor || !(blob instanceof Blob) || blob.size <= 0) return null;
      let audioContext = null;
      try {
        audioContext = new AudioContextCtor();
        const arrayBuffer = await blob.arrayBuffer();
        const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
        const durationSeconds = Number(decodedBuffer?.duration);
        if (Number.isFinite(durationSeconds) && durationSeconds > 0) {
          return normalizeDurationMs(durationSeconds * 1000);
        }
        return null;
      } catch (err) {
        logInfo('Fallback de decode via AudioContext falhou.', err?.message || err);
        return null;
      } finally {
        if (audioContext?.close) {
          try {
            await audioContext.close();
          } catch (_) {}
        }
      }
    }

    async function decodeBlobDurationMs(blob) {
      const fromMetadata = await getBlobDurationFromMediaElement(blob);
      if (fromMetadata !== null) return fromMetadata;
      return getBlobDurationFromAudioContext(blob);
    }

    function resolveCanonicalDuration({ wallClockMs, activeRecordingMs, blobDecodedMs }) {
      const safeWallClockMs = normalizeDurationMs(wallClockMs) || 0;
      const safeActiveRecordingMs = normalizeDurationMs(activeRecordingMs) || 0;
      const safeBlobDecodedMs = normalizeDurationMs(blobDecodedMs);
      const source = safeBlobDecodedMs !== null ? 'blobDecoded' : 'activeRecording';
      const canonicalDurationMs = safeBlobDecodedMs !== null ? safeBlobDecodedMs : safeActiveRecordingMs;
      const driftMs = canonicalDurationMs - safeWallClockMs;
      const driftPct = safeWallClockMs > 0 ? roundTo2((driftMs / safeWallClockMs) * 100) : 0;
      return {
        canonicalDurationMs,
        source,
        duration: {
          source,
          wallClockMs: safeWallClockMs,
          activeRecordingMs: safeActiveRecordingMs,
          blobDecodedMs: safeBlobDecodedMs,
          driftMs,
          driftPct
        }
      };
    }

    function buildTrackerConfig(canonicalDurationMs) {
      return {
        version: 1,
        canonicalDurationMs,
        durationToleranceMs: TRACKER_DURATION_TOLERANCE_MS,
        durationTolerancePct: TRACKER_DURATION_TOLERANCE_PCT,
        flagTypes: TRACKER_FLAG_TYPES,
        severityLevels: TRACKER_SEVERITY_LEVELS,
        statusValues: TRACKER_STATUS_VALUES,
        features: {
          pointMarkers: true,
          rangeMarkers: true,
          loopAB: true,
          comments: true,
          auditTrail: true
        }
      };
    }

    function buildAudioPayload({
      recordingId,
      audioUrl,
      durationMs,
      duration,
      debug,
      sizeBytes,
      mimeType,
      extension,
      recordedAtIso
    }) {
      return {
        v: PAYLOAD_VERSION,
        recordingId,
        audioUrl,
        durationMs,
        duration,
        sizeBytes,
        mimeType,
        extension,
        recordedAt: recordedAtIso,
        debug,
        trackerConfig: buildTrackerConfig(durationMs)
      };
    }

    function serializeWidgetValue(payload) {
      if (!payload) return '';
      if (WIDGET_VALUE_FORMAT === 'json') return JSON.stringify(payload);
      return payload.audioUrl || '';
    }

    function getCurrentWidgetValue() {
      if (latestAudioPayload) {
        return serializeWidgetValue(latestAudioPayload);
      }
      return latestAudioUrl || '';
    }

    function isWidgetRequiredByConfig() {
      try {
        return Boolean(window.JFCustomWidget?.isWidgetRequired?.());
      } catch (_) {
        return false;
      }
    }

    function setWidgetRequiredRuntime(required) {
      if (required) {
        if (window.JFCustomWidget?.makeWidgetRequired) {
          try {
            window.JFCustomWidget.makeWidgetRequired();
            widgetRequiredTemporarilyDisabled = false;
            logInfo('Widget marcado como obrigatorio em runtime.');
          } catch (err) {
            logInfo('Nao foi possivel marcar widget como obrigatorio.', err?.message || err);
          }
        }
        return;
      }

      if (window.JFCustomWidget?.makeWidgetNotRequired) {
        try {
          window.JFCustomWidget.makeWidgetNotRequired();
          widgetRequiredTemporarilyDisabled = true;
          logInfo('Obrigatoriedade temporariamente desativada durante gravacao.');
        } catch (err) {
          logInfo('Nao foi possivel desativar obrigatoriedade em runtime.', err?.message || err);
        }
      }
    }

    function normalizePermissionState(rawState) {
      if (rawState === 'granted') return 'granted';
      if (rawState === 'denied') return 'denied';
      if (rawState === 'checking') return 'checking';
      return 'pending';
    }

    function shortenDebugText(input) {
      const text = String(input || '').trim().replace(/\s+/g, ' ');
      if (!text) return '';
      return text.length > 54 ? `${text.slice(0, 54)}...` : text;
    }

    function setPermissionMeta(kind, source, detail = '') {
      if (!permissionStateMeta[kind]) return;
      permissionStateMeta[kind] = {
        source: shortenDebugText(source || 'unknown'),
        detail: shortenDebugText(detail || '')
      };
    }

    function setPermissionState(kind, nextState, source = 'unknown', detail = '') {
      const normalized = normalizePermissionState(nextState);
      if (kind === 'location') {
        locationPermissionState = normalized;
      } else if (kind === 'microphone') {
        microphonePermissionState = normalized;
      } else {
        return;
      }
      setPermissionMeta(kind, source, detail);
      updatePermissionDebugUI();
      logInfo('Estado de permissao atualizado.', { kind, state: normalized, source, detail });
    }

    function stateToShortLabel(state) {
      if (state === 'granted') return 'ok';
      if (state === 'denied') return 'deny';
      if (state === 'checking') return 'chk';
      return 'pend';
    }

    function updatePermissionDebugUI() {
      const debugLine = document.getElementById('permission-debug');
      if (!debugLine) return;
      if (!SHOW_PERMISSION_DEBUG_INFO) {
        debugLine.classList.add('hidden');
        return;
      }

      const locationMeta = permissionStateMeta.location || {};
      const micMeta = permissionStateMeta.microphone || {};
      const locationDetail = locationMeta.detail ? `,${locationMeta.detail}` : '';
      const micDetail = micMeta.detail ? `,${micMeta.detail}` : '';
      const locationChunk = `L:${stateToShortLabel(locationPermissionState)}(${locationMeta.source || '-'}${locationDetail})`;
      const micChunk = `M:${stateToShortLabel(microphonePermissionState)}(${micMeta.source || '-'}${micDetail})`;
      const appChunk = isJotformAppRuntime ? 'app:yes' : 'app:no';
      debugLine.textContent = `${locationChunk} ${micChunk} ${appChunk}`;
      debugLine.classList.remove('hidden');
      requestWidgetResize();
    }

    function hasAllPermissionsGranted() {
      return locationPermissionState === 'granted' && microphonePermissionState === 'granted';
    }

    function updatePermissionRow(kind, state) {
      const button = document.getElementById(`${kind}PermissionButton`);
      const isLocation = kind === 'location';
      const baseLabel = isLocation ? 'Localizacao' : 'Gravador';

      if (!button) return;

      button.textContent = baseLabel;
      button.className = 'perm-btn';
      button.disabled = false;

      if (state === 'granted') {
        button.textContent = `${baseLabel} OK`;
        button.classList.add('is-granted');
        return;
      }

      if (state === 'checking') {
        button.textContent = `${baseLabel} ...`;
        button.classList.add('is-checking');
        button.disabled = true;
        return;
      }

      button.classList.add('is-pending');
      if (state === 'denied') {
        button.textContent = `${baseLabel} Negado`;
        button.classList.add('is-denied');
      }
    }

    function applyStartButtonVisualState(state, disabled = false) {
      const startBtn = document.getElementById('startButton');
      if (!startBtn) return;

      startBtn.classList.remove('is-ready', 'is-recording', 'is-uploading', 'is-complete');

      if (state === 'recording') {
        startBtn.classList.add('is-recording');
        startBtn.textContent = 'Gravando... Pode avancar';
      } else if (state === 'uploading') {
        startBtn.classList.add('is-uploading');
        startBtn.textContent = 'Finalizando audio...';
      } else if (state === 'complete') {
        startBtn.classList.add('is-complete');
        startBtn.textContent = 'Gravacao iniciada';
      } else {
        startBtn.classList.add('is-ready');
        startBtn.textContent = 'Iniciar Gravacao';
      }

      startBtn.disabled = Boolean(disabled);
    }

    function updatePermissionUI(context = 'default') {
      updatePermissionRow('location', locationPermissionState);
      updatePermissionRow('microphone', microphonePermissionState);
      updatePermissionDebugUI();

      const permissionsStep = document.getElementById('permissions-step');
      const startSection = document.getElementById('recording-step');
      const startBtn = document.getElementById('startButton');
      const permissionsGranted = hasAllPermissionsGranted();

      if (permissionsStep) {
        permissionsStep.classList.toggle('hidden', permissionsGranted);
      }

      if (startSection) {
        startSection.classList.toggle('hidden', !permissionsGranted);
      }

      if (startBtn) {
        if (!permissionsGranted) {
          applyStartButtonVisualState('ready', true);
        } else if (isRecording) {
          applyStartButtonVisualState('recording', true);
        } else if (isUploading) {
          applyStartButtonVisualState('uploading', true);
        } else if (latestAudioUrl) {
          applyStartButtonVisualState('complete', true);
        } else {
          applyStartButtonVisualState('ready', false);
        }
      }

      if (isRecording || isUploading) return;

      if (latestAudioUrl) {
        setStatus('', 'neutral');
        return;
      }

      if (locationPermissionState === 'denied' || microphonePermissionState === 'denied') {
        setStatus('Toque nos botoes para permitir.', 'error');
        return;
      }

      setStatus('', context === 'checking' ? 'processing' : 'neutral');
    }

    async function queryPermissionState(permissionName) {
      if (!navigator.permissions?.query) {
        return null;
      }

      try {
        const permissionStatus = await navigator.permissions.query({ name: permissionName });
        return normalizePermissionState(permissionStatus.state);
      } catch (err) {
        logInfo(`Permissions API indisponivel para ${permissionName}.`, err?.message || err);
        return null;
      }
    }

    function isLikelyMobileWebViewRuntime() {
      const ua = String(navigator?.userAgent || '').toLowerCase();
      const isMobile = /android|iphone|ipad|ipod/.test(ua);
      const hasWebViewHint = ua.includes('wv') || ua.includes('jotform');
      return isMobile && hasWebViewHint;
    }

    async function inferLocationPermissionFromProbe({
      timeoutMs = LOCATION_PERMISSION_TIMEOUT_MS,
      maximumAgeMs = LOCATION_PERMISSION_MAX_AGE_MS
    } = {}) {
      if (!navigator.geolocation?.getCurrentPosition) {
        return null;
      }

      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          () => resolve('granted'),
          async (err) => {
            const code = Number(err?.code);
            if (code === 1) {
              resolve('denied');
              return;
            }

            const queried = await queryPermissionState('geolocation');
            if (queried === 'granted') {
              resolve('granted');
              return;
            }

            if (code === 2 || code === 3) {
              // Sem fix de GPS nao significa falta de permissao.
              resolve('granted');
              return;
            }

            resolve(null);
          },
          {
            enableHighAccuracy: false,
            timeout: timeoutMs,
            maximumAge: maximumAgeMs
          }
        );
      });
    }

    async function inferMicrophonePermissionFromDevices() {
      if (!navigator.mediaDevices?.enumerateDevices) {
        return null;
      }

      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const hasLabeledAudioInput = devices.some((device) =>
          device?.kind === 'audioinput' && typeof device?.label === 'string' && device.label.trim().length > 0
        );
        if (hasLabeledAudioInput) {
          return 'granted';
        }
        return null;
      } catch (err) {
        logInfo('Nao foi possivel inferir permissao do microfone via enumerateDevices.', err?.message || err);
        return null;
      }
    }

    function mergePermissionState(currentState, queriedState) {
      if (!queriedState) return currentState;
      // WebViews (ex.: app do Jotform) podem reportar "prompt/denied" mesmo apos permissao real concedida.
      // Mantemos "granted" quando ele ja foi comprovado por sucesso de getUserMedia/geolocation.
      if (currentState === 'granted' && queriedState !== 'granted') {
        return currentState;
      }
      return queriedState;
    }

    async function refreshPermissionStates(context = 'refresh') {
      const [rawGeoState, rawMicState] = await Promise.all([
        queryPermissionState('geolocation'),
        queryPermissionState('microphone')
      ]);
      let geoState = rawGeoState;
      const shouldAttemptLocationProbe = (isJotformAppRuntime || isLikelyMobileWebViewRuntime())
        && geoState !== 'granted'
        && locationPermissionState !== 'granted';
      if (shouldAttemptLocationProbe) {
        const inferredGeoState = await inferLocationPermissionFromProbe({
          timeoutMs: LOCATION_PERMISSION_TIMEOUT_MS,
          maximumAgeMs: LOCATION_PERMISSION_BOOT_MAX_AGE_MS
        });
        if (inferredGeoState) {
          geoState = inferredGeoState;
        }
      }

      let micState = rawMicState;
      if (micState !== 'granted' && microphonePermissionState !== 'granted') {
        const inferredMicState = await inferMicrophonePermissionFromDevices();
        if (inferredMicState === 'granted') {
          micState = inferredMicState;
        }
      }

      const mergedLocationState = mergePermissionState(locationPermissionState, geoState);
      const mergedMicrophoneState = mergePermissionState(microphonePermissionState, micState);
      setPermissionState('location', mergedLocationState, `query:${context}`, geoState ? `q:${geoState}` : 'q:none');
      setPermissionState(
        'microphone',
        mergedMicrophoneState,
        `query:${context}`,
        micState ? `q:${micState}` : 'q:none'
      );

      logInfo('Estados de permissao atualizados.', {
        context,
        locationPermissionState,
        microphonePermissionState
      });

      updatePermissionUI(context);
    }

    function requestLocationPermission(options = {}) {
      const timeoutMs = Number.isFinite(Number(options?.timeoutMs))
        ? Math.max(800, Math.trunc(Number(options.timeoutMs)))
        : LOCATION_PERMISSION_TIMEOUT_MS;
      const maximumAgeMs = Number.isFinite(Number(options?.maximumAgeMs))
        ? Math.max(0, Math.trunc(Number(options.maximumAgeMs)))
        : LOCATION_PERMISSION_MAX_AGE_MS;
      const source = typeof options?.source === 'string' && options.source.trim()
        ? options.source.trim()
        : 'probe:location';

      if (!navigator.geolocation) {
        setPermissionState('location', 'denied', source, 'geolocation indisponivel');
        updatePermissionUI();
        setStatus('Localizacao nao suportada neste navegador.', 'error');
        return;
      }

      setPermissionState('location', 'checking', source, `solicitando t:${timeoutMs}`);
      updatePermissionUI('checking');
      logInfo('Solicitando permissao de localizacao.');

      navigator.geolocation.getCurrentPosition(
        () => {
          logInfo('Permissao de localizacao concedida.');
          setPermissionState('location', 'granted', source, 'ok:getCurrentPosition');
          updatePermissionUI();
          refreshPermissionStates('location').catch(() => {});
        },
        async (err) => {
          logError('Erro ao obter permissao de localizacao.', err);
          const code = Number(err?.code);
          if (code === 1) {
            setPermissionState('location', 'denied', source, 'err:code1 denied');
            updatePermissionUI();
            return;
          }

          const queried = await queryPermissionState('geolocation');
          if (queried === 'denied') {
            setPermissionState('location', 'denied', source, `q:denied code:${code || 'na'}`);
            updatePermissionUI();
            return;
          }

          if (code === 2 || code === 3 || queried === 'granted') {
            // Em alguns dispositivos a permissao existe, mas o fix de GPS falha/expira.
            setPermissionState(
              'location',
              'granted',
              source,
              `sem-fix code:${code || 'na'} q:${queried || 'none'}`
            );
            updatePermissionUI();
            return;
          }

          setPermissionState('location', 'pending', source, `code:${code || 'na'} q:${queried || 'none'}`);
          updatePermissionUI();
        },
        {
          enableHighAccuracy: false,
          timeout: timeoutMs,
          maximumAge: maximumAgeMs
        }
      );
    }

    async function requestMicrophonePermission() {
      logInfo('Solicitando permissao de microfone.');
      setPermissionState('microphone', 'checking', 'probe:microphone', 'solicitando');
      updatePermissionUI('checking');

      try {
        const stream = await getAudioStreamForRecording();
        stream.getTracks().forEach(track => track.stop());
        logInfo('Permissao de microfone concedida.');
        setPermissionState('microphone', 'granted', 'probe:microphone', 'ok:getUserMedia');
      } catch (err) {
        logError('Erro ao obter permissao de microfone.', err);
        const errName = err?.name || 'unknown';
        if (['NotAllowedError', 'SecurityError'].includes(errName)) {
          setPermissionState('microphone', 'denied', 'probe:microphone', `err:${errName}`);
        } else {
          const queried = await queryPermissionState('microphone');
          if (queried === 'granted') {
            setPermissionState('microphone', 'granted', 'probe:microphone', `q:granted apos err:${errName}`);
          } else {
            const inferred = await inferMicrophonePermissionFromDevices();
            if (inferred === 'granted') {
              setPermissionState('microphone', 'granted', 'probe:microphone', `devices:granted err:${errName}`);
            } else {
              setPermissionState(
                'microphone',
                queried === 'denied' ? 'denied' : 'pending',
                'probe:microphone',
                `err:${errName} q:${queried || 'none'}`
              );
            }
          }
        }
      }

      updatePermissionUI();
      refreshPermissionStates('microphone').catch(() => {});
    }

    function enableJotformDiagnostics() {
      window.addEventListener('message', (event) => {
        if (event?.data) {
          logInfo('postMessage recebido do parent.', event.data);
          let payload = event.data;
          if (typeof payload === 'string') {
            try {
              payload = JSON.parse(payload);
            } catch (_) {}
          }
          if (payload && typeof payload === 'object' && payload.type === 'ready') {
            const nextIsApp = Boolean(payload.isApp);
            if (nextIsApp !== isJotformAppRuntime) {
              isJotformAppRuntime = nextIsApp;
              setPermissionMeta('location', permissionStateMeta.location?.source || 'ready', `isApp:${nextIsApp}`);
              setPermissionMeta('microphone', permissionStateMeta.microphone?.source || 'ready', `isApp:${nextIsApp}`);
              updatePermissionDebugUI();
              runAppInitPermissionRecheck('postMessage-ready').catch(err => {
                logInfo('Revalidacao por postMessage ready falhou.', err?.message || err);
              });
            }
          }
        }
      });

      if (window.JFCustomWidget) {
        try {
          logInfo('JFCustomWidget keys:', Object.keys(window.JFCustomWidget));
        } catch (_) {}
      }
    }

    function sendDataToParent(payload, context = 'unspecified') {
      pendingSendDataPayload = payload;
      if (window.JFCustomWidget?.sendData) {
        logInfo(`sendData dispatch (${context})`, payload);
        window.JFCustomWidget.sendData(payload);
        pendingSendDataPayload = null;
      } else {
        logInfo(`sendData aguardando SDK (${context})`, payload);
      }
    }

    function flushPendingSendData(context = 'flush') {
      if (pendingSendDataPayload && window.JFCustomWidget?.sendData) {
        logInfo(`flush sendData (${context})`, pendingSendDataPayload);
        window.JFCustomWidget.sendData(pendingSendDataPayload);
        pendingSendDataPayload = null;
      }
    }

    function waitForRecordingFinalization() {
      return recordingFinalizationPromise || Promise.resolve();
    }

    function getBaseMimeType(mimeType) {
      const raw = (mimeType || '').trim().toLowerCase();
      if (!raw) return 'audio/webm';
      return raw.split(';')[0] || 'audio/webm';
    }

    function getFileExtensionFromMimeType(mimeType) {
      const normalized = getBaseMimeType(mimeType);
      if (normalized === 'audio/webm') return 'webm';
      if (normalized === 'audio/mp4') return 'mp4';
      if (normalized === 'audio/ogg') return 'ogg';
      return 'webm';
    }

    function getBestSupportedRecorderMimeType() {
      if (!window.MediaRecorder?.isTypeSupported) return '';
      const candidates = [
        'audio/webm;codecs=opus',
        'audio/mp4',
        'audio/webm',
        'audio/ogg;codecs=opus'
      ];
      for (const candidate of candidates) {
        if (window.MediaRecorder.isTypeSupported(candidate)) {
          return candidate;
        }
      }
      return '';
    }

    async function getAudioStreamForRecording() {
      try {
        return await navigator.mediaDevices.getUserMedia({ audio: MOBILE_AUDIO_CONSTRAINTS });
      } catch (err) {
        logError('Falha com constraints avancadas; usando fallback padrao.', err);
        return navigator.mediaDevices.getUserMedia({ audio: true });
      }
    }

    async function requestSignedUpload({ fileName, contentType, metadata = null, formID = '' }) {
      if (!SIGNED_UPLOAD_ENDPOINT) {
        throw new Error('SIGNED_UPLOAD_ENDPOINT nao configurado.');
      }

      const normalizedFormId = normalizeFormIdValue(formID);
      const baseBody = normalizedFormId
        ? { fileName, contentType, formID: normalizedFormId }
        : { fileName, contentType };
      const requestBody = metadata && typeof metadata === 'object'
        ? { ...baseBody, metadata }
        : baseBody;
      const fallbackBodyWithoutFormId = { fileName, contentType };

      const postSignedUploadRequest = (body) => fetch(SIGNED_UPLOAD_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      let response = await postSignedUploadRequest(requestBody);

      if (!response.ok && requestBody !== baseBody) {
        let metadataFailureDetail = '';
        try {
          metadataFailureDetail = await response.text();
        } catch (_) {}
        logInfo(
          'Endpoint recusou metadata no signed upload; retry sem metadata.',
          response.status,
          metadataFailureDetail?.slice(0, 300) || ''
        );
        response = await postSignedUploadRequest(baseBody);
      }

      if (!response.ok && normalizedFormId) {
        let formIdFailureDetail = '';
        try {
          formIdFailureDetail = await response.text();
        } catch (_) {}
        logInfo(
          'Endpoint recusou payload com formID; fallback sem formID.',
          response.status,
          formIdFailureDetail?.slice(0, 300) || ''
        );
        response = await postSignedUploadRequest(fallbackBodyWithoutFormId);
      }

      if (!response.ok) {
        let finalFailureDetail = '';
        try {
          finalFailureDetail = await response.text();
        } catch (_) {}
        throw new Error(
          `Falha ao obter URL assinada (${response.status}). ${finalFailureDetail?.slice(0, 300) || ''}`.trim()
        );
      }
      const data = await response.json();
      if (!data?.uploadUrl || !data?.publicUrl) {
        throw new Error('Resposta invalida da URL assinada (uploadUrl/publicUrl ausentes).');
      }
      return data;
    }

    function releaseActiveStream() {
      if (!activeStream) return;
      try {
        activeStream.getTracks().forEach(track => track.stop());
      } catch (_) {}
      activeStream = null;
    }

    async function runAppInitPermissionRecheck(reason = 'init') {
      const shouldUseAppRecheck = isJotformAppRuntime || isLikelyMobileWebViewRuntime();
      if (!ENABLE_APP_INIT_PERMISSION_RECHECK || !shouldUseAppRecheck || appInitPermissionRecheckDone) {
        return;
      }
      appInitPermissionRecheckDone = true;
      logInfo('Revalidacao ativa de permissao no app Jotform.', {
        reason,
        locationPermissionState,
        microphonePermissionState
      });

      if (locationPermissionState !== 'granted') {
        requestLocationPermission({
          source: 'bootstrap:location',
          timeoutMs: LOCATION_PERMISSION_TIMEOUT_MS,
          maximumAgeMs: LOCATION_PERMISSION_BOOT_MAX_AGE_MS
        });
      }

      if (microphonePermissionState !== 'granted') {
        await requestMicrophonePermission();
      }
    }

    function initializeControls() {
      if (controlsInitialized) return;

      const locationBtn = document.getElementById('locationPermissionButton');
      const microphoneBtn = document.getElementById('microphonePermissionButton');
      const startBtn = document.getElementById('startButton');

      if (!locationBtn || !microphoneBtn || !startBtn) return;

      locationBtn.addEventListener('click', () => {
        requestLocationPermission({
          source: 'tap:location',
          timeoutMs: LOCATION_PERMISSION_TIMEOUT_MS,
          maximumAgeMs: LOCATION_PERMISSION_MAX_AGE_MS
        });
      });
      microphoneBtn.addEventListener('click', requestMicrophonePermission);
      startBtn.addEventListener('click', startRecording);

      controlsInitialized = true;
      logInfo('Controles iniciais registrados.');
      updatePermissionUI('init');
      refreshPermissionStates('init').catch(err => {
        logInfo('Nao foi possivel consultar permissoes iniciais.', err?.message || err);
      });
    }

    async function startRecording() {
      const startBtn = document.getElementById('startButton');

      if (!startBtn) return;

      if (!hasAllPermissionsGranted()) {
        setStatus('Permita localizacao e microfone antes de gravar.', 'error');
        return;
      }

      if (isRecording) {
        setStatus('Gravando..', 'recording');
        updatePermissionUI('already-recording');
        return;
      }

      if (isUploading) {
        setStatus('Aguarde o upload anterior finalizar.', 'processing');
        return;
      }

      if (!window.MediaRecorder) {
        setStatus('Gravacao nao suportada neste navegador.', 'error');
        return;
      }

      try {
        logInfo('Iniciando gravacao.');
        const stream = await getAudioStreamForRecording();
        activeStream = stream;
        const preferredMimeType = getBestSupportedRecorderMimeType();
        const recorderOptions = {
          audioBitsPerSecond: RECORDER_TARGET_BITRATE
        };
        if (preferredMimeType) {
          recorderOptions.mimeType = preferredMimeType;
        }
        mediaRecorder = new MediaRecorder(stream, recorderOptions);
        recordedMimeType = getBaseMimeType(mediaRecorder.mimeType || preferredMimeType || 'audio/webm');
        recordedFileExtension = getFileExtensionFromMimeType(recordedMimeType);
        logInfo('MediaRecorder iniciado.', {
          mimeType: mediaRecorder.mimeType,
          uploadMimeType: recordedMimeType,
          extension: recordedFileExtension,
          bitrate: RECORDER_TARGET_BITRATE
        });
        resetRecordingRuntimeState();
        isRecording = true;
        hasRecordingStarted = true;
        recordingStartedAtMs = Date.now();
        recordingStartedAtIso = new Date(recordingStartedAtMs).toISOString();
        currentRecordingId = createRecordingId();
        openActiveRecordingSegment(recordingStartedAtMs);
        latestAudioUrl = '';
        latestAudioPayload = null;
        logInfo('Gravacao iniciada.', {
          recordingId: currentRecordingId,
          startAt: recordingStartedAtIso
        });
        if ((FORCE_WIDGET_REQUIRED_AT_RUNTIME || widgetRequiresAudio) && !widgetRequiredTemporarilyDisabled) {
          setWidgetRequiredRuntime(false);
        }
        sendDataToParent({ value: '' }, 'recording-start');

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onpause = () => {
          const pausedAtMs = Date.now();
          recordingPauseCount += 1;
          const activeRecordingMs = closeActiveRecordingSegment(pausedAtMs);
          logInfo('Gravacao pausada.', {
            recordingId: currentRecordingId,
            pauseCount: recordingPauseCount,
            pausedAt: new Date(pausedAtMs).toISOString(),
            activeRecordingMs
          });
        };

        mediaRecorder.onresume = () => {
          const resumedAtMs = Date.now();
          recordingResumeCount += 1;
          openActiveRecordingSegment(resumedAtMs);
          logInfo('Gravacao retomada.', {
            recordingId: currentRecordingId,
            resumeCount: recordingResumeCount,
            resumedAt: new Date(resumedAtMs).toISOString()
          });
        };

        recordingFinalizationPromise = new Promise((resolve) => {
          mediaRecorder.onstop = async () => {
            logInfo('Finalizando gravacao; iniciando processamento.');
            isRecording = false;
            releaseActiveStream();
            isUploading = true;
            setStatus('Processando e enviando audio...', 'processing');
            updatePermissionUI('uploading');

            try {
              const recordingEndedAtMs = Date.now();
              const recordedAtIso = new Date(recordingEndedAtMs).toISOString();
              const wallClockMs = Math.max(0, recordingEndedAtMs - recordingStartedAtMs);
              const activeRecordingMs = closeActiveRecordingSegment(recordingEndedAtMs);
              const audioBlob = new Blob(audioChunks, { type: recordedMimeType });
              const sizeBytes = audioBlob.size;
              const chunksCount = audioChunks.length;
              const blobDecodedMs = await decodeBlobDurationMs(audioBlob);
              const {
                canonicalDurationMs,
                duration
              } = resolveCanonicalDuration({ wallClockMs, activeRecordingMs, blobDecodedMs });
              const durationPayload = {
                ...duration,
                computedAt: recordedAtIso
              };
              const debugPayload = {
                startAt: recordingStartedAtIso || new Date(recordingStartedAtMs).toISOString(),
                stopAt: recordedAtIso,
                pauseCount: recordingPauseCount,
                resumeCount: recordingResumeCount,
                chunksCount,
                blobSizeBytes: sizeBytes,
                timesliceMs: RECORDER_TIMESLICE_MS,
                targetBitrate: RECORDER_TARGET_BITRATE
              };
              logInfo('Metricas de duracao consolidadas.', {
                recordingId: currentRecordingId,
                duration: durationPayload,
                debug: debugPayload
              });
              const uploadMetadata = {
                v: PAYLOAD_VERSION,
                recordingId: currentRecordingId,
                durationMs: canonicalDurationMs,
                sizeBytes,
                mimeType: recordedMimeType,
                extension: recordedFileExtension,
                recordedAt: recordedAtIso,
                duration: durationPayload,
                debug: debugPayload
              };
              const fileName = `gravacao-${recordingEndedAtMs}-d${canonicalDurationMs}ms.${recordedFileExtension}`;
              logInfo('Solicitando URL assinada para upload.', fileName);
              const { uploadUrl, publicUrl } = await requestSignedUpload({
                fileName,
                contentType: recordedMimeType,
                metadata: uploadMetadata,
                formID: widgetFormId
              });

              logInfo('Enviando arquivo para Supabase via URL assinada.');
              const uploadResponse = await fetch(uploadUrl, {
                method: 'PUT',
                headers: { 'Content-Type': recordedMimeType },
                body: audioBlob
              });

              if (!uploadResponse.ok) {
                throw new Error(`Upload falhou (${uploadResponse.status}).`);
              }

              latestAudioUrl = publicUrl;
              latestAudioPayload = buildAudioPayload({
                recordingId: currentRecordingId,
                audioUrl: publicUrl,
                durationMs: canonicalDurationMs,
                duration: durationPayload,
                debug: debugPayload,
                sizeBytes,
                mimeType: recordedMimeType,
                extension: recordedFileExtension,
                recordedAtIso
              });
              logInfo('URL publica gerada.', publicUrl);
              setStatus('Audio pronto para envio.', 'success');
              sendDataToParent({ value: serializeWidgetValue(latestAudioPayload) }, 'upload-complete');
              flushPendingSendData('upload-complete');
            } catch (err) {
              logError('Erro no upload do audio.', err);
              setStatus('Erro ao enviar audio.', 'error');
              latestAudioUrl = '';
              latestAudioPayload = null;
            } finally {
              isUploading = false;
              recordingFinalizationPromise = null;
              resetRecordingRuntimeState();
              if ((FORCE_WIDGET_REQUIRED_AT_RUNTIME || widgetRequiresAudio) && widgetRequiredTemporarilyDisabled) {
                setWidgetRequiredRuntime(true);
              }
              updatePermissionUI('post-upload');
              resolve();
            }
          };
        });

        mediaRecorder.start(RECORDER_TIMESLICE_MS);
        setStatus('Gravando..', 'recording');
        updatePermissionUI('recording-started');
      } catch (err) {
        logError('Erro ao iniciar gravacao.', err);
        setStatus(`Erro: ${err.name}`, 'error');
        releaseActiveStream();
        isRecording = false;
        isUploading = false;
        recordingFinalizationPromise = null;
        resetRecordingRuntimeState();
        if ((FORCE_WIDGET_REQUIRED_AT_RUNTIME || widgetRequiresAudio) && widgetRequiredTemporarilyDisabled) {
          setWidgetRequiredRuntime(true);
        }
        updatePermissionUI('recording-start-error');
      }
    }

    function stopActiveRecording(reason = 'manual') {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        return waitForRecordingFinalization();
      }

      logInfo('Solicitando parada da gravacao.', reason);

      try {
        mediaRecorder.stop();
      } catch (err) {
        logError('Falha ao parar a gravacao.', err);
      }

      return waitForRecordingFinalization();
    }

    async function handleWidgetSubmit() {
      const status = document.getElementById('status-text');
      const shouldRequireAudio = FORCE_WIDGET_REQUIRED_AT_RUNTIME || widgetRequiresAudio;

      if (submitInProgress) {
        return;
      }

      submitInProgress = true;
      logInfo('Submit acionado pelo Jotform.');

      try {
        if (shouldRequireAudio && !hasRecordingStarted && !getCurrentWidgetValue()) {
          logInfo('Submit bloqueado: gravacao ainda nao iniciada.');
          if (status) setStatus('Inicie a gravacao para continuar.', 'error');
          JFCustomWidget.sendSubmit({
            valid: false,
            value: ''
          });
          return;
        }

        if (isRecording) {
          if (status) setStatus('Finalizando a gravacao antes do envio...', 'processing');
          await stopActiveRecording('submit');
        } else if (isUploading) {
          if (status) setStatus('Aguardando o audio ficar pronto...', 'processing');
          await waitForRecordingFinalization();
        }

        const submitValue = getCurrentWidgetValue();

        if (!submitValue) {
          if (!shouldRequireAudio) {
            logInfo('Submit permitido sem audio (widget nao obrigatorio).');
            JFCustomWidget.sendSubmit({
              valid: true,
              value: ''
            });
            return;
          }
          logInfo('Nenhum audio disponivel no submit.');
          if (status) setStatus('Grave um audio antes de enviar.', 'error');
          JFCustomWidget.sendSubmit({
            valid: false,
            value: ''
          });
          return;
        }

        sendDataToParent({ value: submitValue }, 'submit-final');
        flushPendingSendData('submit-final');
        logInfo('Valor final enviado ao Jotform.', submitValue);
        JFCustomWidget.sendSubmit({
          valid: true,
          value: submitValue
        });
      } catch (err) {
        logError('Falha ao finalizar audio antes do envio.', err);
        if (!shouldRequireAudio) {
          JFCustomWidget.sendSubmit({
            valid: true,
            value: getCurrentWidgetValue()
          });
          return;
        }
        if (status) setStatus('Erro ao finalizar audio. Tente novamente.', 'error');
        JFCustomWidget.sendSubmit({
          valid: false,
          value: getCurrentWidgetValue()
        });
      } finally {
        submitInProgress = false;
      }
    }

    // 2. onJotformReady global
    window.onJotformReady = function () {
      logInfo('onJotformReady chamado.');
      if (!window.JFCustomWidget || widgetSubscriptionsRegistered) return;

      widgetSubscriptionsRegistered = true;
      logInfo('Registrando eventos do Jotform.');

      JFCustomWidget.subscribe('ready', (readyPayload = {}) => {
        const value = readyPayload?.value;
        if (typeof readyPayload?.isApp === 'boolean') {
          isJotformAppRuntime = readyPayload.isApp;
          updatePermissionDebugUI();
        }
        const resolvedFormId = resolveWidgetFormId(readyPayload);
        if (resolvedFormId) {
          widgetFormId = resolvedFormId;
        }
        if (widgetFormId) {
          logInfo('formID do widget resolvido.', widgetFormId);
        } else {
          logInfo('formID nao encontrado no contexto do widget; upload segue sem formID.');
        }
        logInfo('Evento ready recebido.', readyPayload);
        if (widgetInitialized) return;
        widgetInitialized = true;

        initializeControls();
        widgetRequiresAudio = isWidgetRequiredByConfig();
        logInfo('Widget required (config detectada):', widgetRequiresAudio);
        if (FORCE_WIDGET_REQUIRED_AT_RUNTIME) {
          setWidgetRequiredRuntime(true);
          widgetRequiresAudio = true;
        }

        const incomingValue = parseIncomingWidgetValue(value || '');
        const initialValue = incomingValue.rawValue || '';
        if (incomingValue.audioUrl) {
          hasRecordingStarted = true;
          latestAudioUrl = incomingValue.audioUrl;
          latestAudioPayload = incomingValue.payload;
          const status = document.getElementById('status-text');
          if (status) setStatus('Audio existente pronto para envio.', 'success');
        }

        sendDataToParent({ value: initialValue }, 'ready');
        flushPendingSendData('ready');
        runAppInitPermissionRecheck('ready').catch(err => {
          logInfo('Revalidacao inicial de permissao (app) falhou.', err?.message || err);
        });
      });

      JFCustomWidget.subscribe('submit', () => {
        logInfo('Evento submit recebido.');
        handleWidgetSubmit().catch(err => {
          logError('Submit handler rejeitado.', err);
        });
      });

      flushPendingSendData('onJotformReady');
    };

    if (window.JFCustomWidget) {
      logInfo('JFCustomWidget detectado imediatamente.');
      window.onJotformReady();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        logInfo('DOMContentLoaded disparado.');
        enableJotformDiagnostics();
        initializeControls();
      });
    } else {
      logInfo('DOM pronto. Inicializando controles.');
      enableJotformDiagnostics();
      initializeControls();
    }

    const widgetSdkPoll = setInterval(() => {
      if (window.JFCustomWidget?.sendData) {
        logInfo('JFCustomWidget detectado via poll.');
        flushPendingSendData('poll');
        clearInterval(widgetSdkPoll);
        if (!widgetSubscriptionsRegistered) {
          window.onJotformReady();
        }
      }
    }, 250);
  </script>

  <style>
    :root {
      --surface: #ffffff;
      --border: #dbe2ea;
      --text: #0f172a;
      --muted: #475569;
      --ok-bg: #dcfce7;
      --ok-fg: #14532d;
      --pending-bg: #fee2e2;
      --pending-fg: #991b1b;
      --wait-bg: #fef3c7;
      --wait-fg: #78350f;
      --cta-ready-a: #2563eb;
      --cta-ready-b: #1d4ed8;
      --cta-record-a: #22c55e;
      --cta-record-b: #15803d;
      --cta-upload-a: #0ea5e9;
      --cta-upload-b: #2563eb;
      --cta-fg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 4px;
      background: transparent;
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
    }

    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    button {
      width: 100%;
      min-height: 60px;
      padding: 8px 7px;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.72;
    }

    .perm-btn.is-pending,
    .perm-btn.is-denied {
      background: var(--pending-bg);
      color: var(--pending-fg);
    }

    .perm-btn.is-checking {
      background: var(--wait-bg);
      color: var(--wait-fg);
    }

    .perm-btn.is-granted {
      background: var(--ok-bg);
      color: var(--ok-fg);
    }

    #startButton {
      background: linear-gradient(135deg, var(--cta-ready-a) 0%, var(--cta-ready-b) 100%);
      color: var(--cta-fg);
      box-shadow: 0 10px 20px rgba(29, 78, 216, 0.24);
      transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      letter-spacing: 0.2px;
    }

    #startButton:disabled {
      opacity: 1;
    }

    #startButton.is-recording {
      background: linear-gradient(135deg, var(--cta-record-a) 0%, var(--cta-record-b) 100%);
      box-shadow: 0 10px 24px rgba(21, 128, 61, 0.32);
      animation: pulseRecordingButton 1.5s ease-in-out infinite;
    }

    #startButton.is-uploading {
      background: linear-gradient(135deg, var(--cta-upload-a) 0%, var(--cta-upload-b) 100%);
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.28);
    }

    #startButton.is-complete {
      background: linear-gradient(135deg, var(--cta-record-a) 0%, var(--cta-record-b) 100%);
      box-shadow: 0 10px 22px rgba(21, 128, 61, 0.3);
    }

    .status-line {
      margin-top: 4px;
      min-height: 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
    }

    .status-line p {
      margin: 0;
    }

    .status-line[data-tone='error'] {
      color: #991b1b;
    }

    .status-line[data-tone='success'] {
      color: #14532d;
    }

    .status-line[data-tone='recording'] {
      color: #92400e;
    }

    .status-line[data-tone='processing'] {
      color: #1d4ed8;

    .hidden {
      display: none !important;
    }

    @keyframes pulseRecordingButton {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.02);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>
