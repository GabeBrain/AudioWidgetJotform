<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Widget de Gravacao de Audio</title>
  <script>
    // Endpoint seguro que gera URL assinada de upload no Supabase
    // Exemplo esperado de resposta: { uploadUrl, publicUrl }
    const SIGNED_UPLOAD_ENDPOINT = 'https://qrnpgskrapnfpksucdvq.supabase.co/functions/v1/audio-upload-url';
  </script>

  <!-- 1. Declaracao ANTES do script do Jotform -->
  <script>
    let mediaRecorder;
    let audioChunks = [];
    let latestAudioUrl = '';
    let isUploading = false;
    let widgetInitialized = false;
    let widgetSubscriptionsRegistered = false;
    let controlsInitialized = false;
    let isRecording = false;
    let activeStream = null;
    let recordingFinalizationPromise = null;
    let submitInProgress = false;
    let pendingSendDataPayload = null;
    let recordedMimeType = 'audio/webm';
    let recordedFileExtension = 'webm';
    let locationPermissionState = 'pending';
    let microphonePermissionState = 'pending';
    let hasRecordingStarted = false;
    let recordingStartedAtMs = 0;
    let latestAudioPayload = null;

    const RECORDER_TARGET_BITRATE = 96000;
    const RECORDER_TIMESLICE_MS = 1000;
    const PAYLOAD_VERSION = 2;
    const WIDGET_VALUE_FORMAT = 'json';
    const MOBILE_AUDIO_CONSTRAINTS = {
      channelCount: { ideal: 1 },
      sampleRate: { ideal: 48000 },
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    };

    const logInfo = (...args) => console.log('[WidgetAudio]', ...args);
    const logError = (...args) => console.error('[WidgetAudio]', ...args);

    logInfo('Script inicializado.');

    function setStatus(message, tone = 'neutral') {
      const statusText = document.getElementById('status-text');
      const statusCard = document.getElementById('status-card');

      if (statusText) {
        statusText.textContent = message;
      }

      if (statusCard) {
        statusCard.setAttribute('data-tone', tone);
      }
    }

    function safeParseJson(rawValue) {
      if (!rawValue || typeof rawValue !== 'string') return null;
      const trimmed = rawValue.trim();
      if (!trimmed.startsWith('{') || !trimmed.endsWith('}')) return null;
      try {
        return JSON.parse(trimmed);
      } catch (_) {
        return null;
      }
    }

    function parseIncomingWidgetValue(rawValue) {
      if (!rawValue || typeof rawValue !== 'string') {
        return { rawValue: '', payload: null, audioUrl: '' };
      }

      const parsed = safeParseJson(rawValue);
      if (parsed && typeof parsed === 'object' && typeof parsed.audioUrl === 'string') {
        return {
          rawValue,
          payload: parsed,
          audioUrl: parsed.audioUrl || ''
        };
      }

      return { rawValue, payload: null, audioUrl: rawValue };
    }

    function buildAudioPayload({
      audioUrl,
      durationMs,
      sizeBytes,
      mimeType,
      extension,
      recordedAtIso
    }) {
      return {
        v: PAYLOAD_VERSION,
        audioUrl,
        durationMs,
        sizeBytes,
        mimeType,
        extension,
        recordedAt: recordedAtIso
      };
    }

    function serializeWidgetValue(payload) {
      if (!payload) return '';
      if (WIDGET_VALUE_FORMAT === 'json') return JSON.stringify(payload);
      return payload.audioUrl || '';
    }

    function getCurrentWidgetValue() {
      if (latestAudioPayload) {
        return serializeWidgetValue(latestAudioPayload);
      }
      return latestAudioUrl || '';
    }

    function normalizePermissionState(rawState) {
      if (rawState === 'granted') return 'granted';
      if (rawState === 'denied') return 'denied';
      if (rawState === 'checking') return 'checking';
      return 'pending';
    }

    function hasAllPermissionsGranted() {
      return locationPermissionState === 'granted' && microphonePermissionState === 'granted';
    }

    function updatePermissionRow(kind, state) {
      const dot = document.getElementById(`${kind}PermissionDot`);
      const text = document.getElementById(`${kind}PermissionText`);
      const button = document.getElementById(`${kind}PermissionButton`);
      const isLocation = kind === 'location';
      const baseLabel = isLocation ? 'localizacao' : 'microfone';

      if (dot) {
        dot.setAttribute('data-state', state);
      }

      if (!text || !button) return;

      if (state === 'granted') {
        text.textContent = 'Permissao concedida.';
        button.textContent = 'Concedido';
        button.className = 'btn-granted';
        button.disabled = true;
        return;
      }

      if (state === 'checking') {
        text.textContent = 'Verificando permissao...';
        button.textContent = 'Verificando...';
        button.className = 'btn-warning';
        button.disabled = true;
        return;
      }

      if (state === 'denied') {
        text.textContent = 'Permissao bloqueada. Toque para tentar novamente.';
        button.textContent = 'Tentar novamente';
        button.className = 'btn-danger';
        button.disabled = false;
        return;
      }

      text.textContent = 'Permissao pendente.';
      button.textContent = `Permitir ${baseLabel}`;
      button.className = 'btn-warning';
      button.disabled = false;
    }

    function updatePermissionUI(context = 'default') {
      updatePermissionRow('location', locationPermissionState);
      updatePermissionRow('microphone', microphonePermissionState);

      const startSection = document.getElementById('recording-step');
      const startBtn = document.getElementById('startButton');
      const permissionsGranted = hasAllPermissionsGranted();

      if (startSection) {
        startSection.classList.toggle('hidden', !permissionsGranted);
      }

      if (startBtn && !isRecording) {
        startBtn.disabled = !permissionsGranted || isUploading;
      }

      if (isRecording || isUploading) return;

      if (latestAudioUrl) {
        setStatus('Audio pronto para envio.', 'success');
        return;
      }

      if (permissionsGranted) {
        setStatus('Permissoes concedidas. Toque para iniciar a gravacao.', 'ready');
        return;
      }

      if (locationPermissionState === 'denied' || microphonePermissionState === 'denied') {
        setStatus('Revise as permissoes para continuar.', 'error');
        return;
      }

      setStatus(
        'Conceda localizacao e microfone para habilitar a gravacao.',
        context === 'checking' ? 'processing' : 'neutral'
      );
    }

    async function queryPermissionState(permissionName) {
      if (!navigator.permissions?.query) {
        return null;
      }

      try {
        const permissionStatus = await navigator.permissions.query({ name: permissionName });
        return normalizePermissionState(permissionStatus.state);
      } catch (err) {
        logInfo(`Permissions API indisponivel para ${permissionName}.`, err?.message || err);
        return null;
      }
    }

    async function refreshPermissionStates(context = 'refresh') {
      const [geoState, micState] = await Promise.all([
        queryPermissionState('geolocation'),
        queryPermissionState('microphone')
      ]);

      if (geoState) {
        locationPermissionState = geoState;
      }

      if (micState) {
        microphonePermissionState = micState;
      }

      logInfo('Estados de permissao atualizados.', {
        context,
        locationPermissionState,
        microphonePermissionState
      });

      updatePermissionUI(context);
    }

    function requestLocationPermission() {
      if (!navigator.geolocation) {
        locationPermissionState = 'denied';
        updatePermissionUI();
        setStatus('Localizacao nao suportada neste navegador.', 'error');
        return;
      }

      locationPermissionState = 'checking';
      updatePermissionUI('checking');
      logInfo('Solicitando permissao de localizacao.');

      navigator.geolocation.getCurrentPosition(
        () => {
          logInfo('Permissao de localizacao concedida.');
          locationPermissionState = 'granted';
          updatePermissionUI();
          refreshPermissionStates('location').catch(() => {});
        },
        (err) => {
          logError('Erro ao obter permissao de localizacao.', err);
          locationPermissionState = Number(err?.code) === 1 ? 'denied' : 'pending';
          updatePermissionUI();
        },
        {
          enableHighAccuracy: false,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    async function requestMicrophonePermission() {
      logInfo('Solicitando permissao de microfone.');
      microphonePermissionState = 'checking';
      updatePermissionUI('checking');

      try {
        const stream = await getAudioStreamForRecording();
        stream.getTracks().forEach(track => track.stop());
        logInfo('Permissao de microfone concedida.');
        microphonePermissionState = 'granted';
      } catch (err) {
        logError('Erro ao obter permissao de microfone.', err);
        microphonePermissionState = ['NotAllowedError', 'SecurityError'].includes(err?.name) ? 'denied' : 'pending';
      }

      updatePermissionUI();
      refreshPermissionStates('microphone').catch(() => {});
    }

    function enableJotformDiagnostics() {
      window.addEventListener('message', (event) => {
        if (event?.data) {
          logInfo('postMessage recebido do parent.', event.data);
        }
      });

      if (window.JFCustomWidget) {
        try {
          logInfo('JFCustomWidget keys:', Object.keys(window.JFCustomWidget));
        } catch (_) {}
      }
    }

    function sendDataToParent(payload, context = 'unspecified') {
      pendingSendDataPayload = payload;
      if (window.JFCustomWidget?.sendData) {
        logInfo(`sendData dispatch (${context})`, payload);
        window.JFCustomWidget.sendData(payload);
        pendingSendDataPayload = null;
      } else {
        logInfo(`sendData aguardando SDK (${context})`, payload);
      }
    }

    function flushPendingSendData(context = 'flush') {
      if (pendingSendDataPayload && window.JFCustomWidget?.sendData) {
        logInfo(`flush sendData (${context})`, pendingSendDataPayload);
        window.JFCustomWidget.sendData(pendingSendDataPayload);
        pendingSendDataPayload = null;
      }
    }

    function waitForRecordingFinalization() {
      return recordingFinalizationPromise || Promise.resolve();
    }

    function getBaseMimeType(mimeType) {
      const raw = (mimeType || '').trim().toLowerCase();
      if (!raw) return 'audio/webm';
      return raw.split(';')[0] || 'audio/webm';
    }

    function getFileExtensionFromMimeType(mimeType) {
      const normalized = getBaseMimeType(mimeType);
      if (normalized === 'audio/webm') return 'webm';
      if (normalized === 'audio/mp4') return 'mp4';
      if (normalized === 'audio/ogg') return 'ogg';
      return 'webm';
    }

    function getBestSupportedRecorderMimeType() {
      if (!window.MediaRecorder?.isTypeSupported) return '';
      const candidates = [
        'audio/webm;codecs=opus',
        'audio/mp4',
        'audio/webm',
        'audio/ogg;codecs=opus'
      ];
      for (const candidate of candidates) {
        if (window.MediaRecorder.isTypeSupported(candidate)) {
          return candidate;
        }
      }
      return '';
    }

    async function getAudioStreamForRecording() {
      try {
        return await navigator.mediaDevices.getUserMedia({ audio: MOBILE_AUDIO_CONSTRAINTS });
      } catch (err) {
        logError('Falha com constraints avancadas; usando fallback padrao.', err);
        return navigator.mediaDevices.getUserMedia({ audio: true });
      }
    }

    async function requestSignedUpload({ fileName, contentType, metadata = null }) {
      if (!SIGNED_UPLOAD_ENDPOINT) {
        throw new Error('SIGNED_UPLOAD_ENDPOINT nao configurado.');
      }

      const baseBody = { fileName, contentType };
      const requestBody = metadata && typeof metadata === 'object'
        ? { ...baseBody, metadata }
        : baseBody;

      const postSignedUploadRequest = (body) => fetch(SIGNED_UPLOAD_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      let response = await postSignedUploadRequest(requestBody);

      if (!response.ok && requestBody !== baseBody) {
        let metadataFailureDetail = '';
        try {
          metadataFailureDetail = await response.text();
        } catch (_) {}
        logInfo(
          'Endpoint recusou metadata no signed upload; retry sem metadata.',
          response.status,
          metadataFailureDetail?.slice(0, 300) || ''
        );
        response = await postSignedUploadRequest(baseBody);
      }

      if (!response.ok) {
        let finalFailureDetail = '';
        try {
          finalFailureDetail = await response.text();
        } catch (_) {}
        throw new Error(
          `Falha ao obter URL assinada (${response.status}). ${finalFailureDetail?.slice(0, 300) || ''}`.trim()
        );
      }
      const data = await response.json();
      if (!data?.uploadUrl || !data?.publicUrl) {
        throw new Error('Resposta invalida da URL assinada (uploadUrl/publicUrl ausentes).');
      }
      return data;
    }

    function releaseActiveStream() {
      if (!activeStream) return;
      try {
        activeStream.getTracks().forEach(track => track.stop());
      } catch (_) {}
      activeStream = null;
    }

    function initializeControls() {
      if (controlsInitialized) return;

      const locationBtn = document.getElementById('locationPermissionButton');
      const microphoneBtn = document.getElementById('microphonePermissionButton');
      const startBtn = document.getElementById('startButton');

      if (!locationBtn || !microphoneBtn || !startBtn) return;

      locationBtn.addEventListener('click', requestLocationPermission);
      microphoneBtn.addEventListener('click', requestMicrophonePermission);
      startBtn.addEventListener('click', startRecording);

      controlsInitialized = true;
      logInfo('Controles iniciais registrados.');
      updatePermissionUI('init');
      refreshPermissionStates('init').catch(err => {
        logInfo('Nao foi possivel consultar permissoes iniciais.', err?.message || err);
      });
    }

    async function startRecording() {
      const status = document.getElementById('status-text');
      const startBtn = document.getElementById('startButton');

      if (!startBtn || !status) return;

      if (!hasAllPermissionsGranted()) {
        setStatus('Permita localizacao e microfone antes de gravar.', 'error');
        return;
      }

      if (isRecording) {
        setStatus('Gravando..', 'recording');
        return;
      }

      if (isUploading) {
        setStatus('Aguarde o upload anterior finalizar.', 'processing');
        return;
      }

      if (!window.MediaRecorder) {
        setStatus('Gravacao nao suportada neste navegador.', 'error');
        return;
      }

      try {
        logInfo('Iniciando gravacao.');
        const stream = await getAudioStreamForRecording();
        activeStream = stream;
        const preferredMimeType = getBestSupportedRecorderMimeType();
        const recorderOptions = {
          audioBitsPerSecond: RECORDER_TARGET_BITRATE
        };
        if (preferredMimeType) {
          recorderOptions.mimeType = preferredMimeType;
        }
        mediaRecorder = new MediaRecorder(stream, recorderOptions);
        recordedMimeType = getBaseMimeType(mediaRecorder.mimeType || preferredMimeType || 'audio/webm');
        recordedFileExtension = getFileExtensionFromMimeType(recordedMimeType);
        logInfo('MediaRecorder iniciado.', {
          mimeType: mediaRecorder.mimeType,
          uploadMimeType: recordedMimeType,
          extension: recordedFileExtension,
          bitrate: RECORDER_TARGET_BITRATE
        });
        audioChunks = [];
        isRecording = true;
        hasRecordingStarted = true;
        recordingStartedAtMs = Date.now();
        latestAudioUrl = '';
        latestAudioPayload = null;
        sendDataToParent({ value: '' }, 'recording-start');

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        recordingFinalizationPromise = new Promise((resolve) => {
          mediaRecorder.onstop = async () => {
            logInfo('Finalizando gravacao; iniciando processamento.');
            isRecording = false;
            releaseActiveStream();
            isUploading = true;
            setStatus('Processando e enviando audio...', 'processing');

            try {
              const audioBlob = new Blob(audioChunks, { type: recordedMimeType });
              const recordingEndedAtMs = Date.now();
              const durationMs = Math.max(0, recordingEndedAtMs - recordingStartedAtMs);
              const sizeBytes = audioBlob.size;
              const recordedAtIso = new Date(recordingEndedAtMs).toISOString();
              const uploadMetadata = {
                v: PAYLOAD_VERSION,
                durationMs,
                sizeBytes,
                mimeType: recordedMimeType,
                extension: recordedFileExtension,
                recordedAt: recordedAtIso
              };
              const fileName = `gravacao-${recordingEndedAtMs}-d${durationMs}ms.${recordedFileExtension}`;
              logInfo('Solicitando URL assinada para upload.', fileName);
              const { uploadUrl, publicUrl } = await requestSignedUpload({
                fileName,
                contentType: recordedMimeType,
                metadata: uploadMetadata
              });

              logInfo('Enviando arquivo para Supabase via URL assinada.');
              const uploadResponse = await fetch(uploadUrl, {
                method: 'PUT',
                headers: { 'Content-Type': recordedMimeType },
                body: audioBlob
              });

              if (!uploadResponse.ok) {
                throw new Error(`Upload falhou (${uploadResponse.status}).`);
              }

              latestAudioUrl = publicUrl;
              latestAudioPayload = buildAudioPayload({
                audioUrl: publicUrl,
                durationMs,
                sizeBytes,
                mimeType: recordedMimeType,
                extension: recordedFileExtension,
                recordedAtIso
              });
              logInfo('URL publica gerada.', publicUrl);
              setStatus('Audio pronto para envio.', 'success');
              sendDataToParent({ value: serializeWidgetValue(latestAudioPayload) }, 'upload-complete');
              flushPendingSendData('upload-complete');
            } catch (err) {
              logError('Erro no upload do audio.', err);
              setStatus('Erro ao enviar audio.', 'error');
              latestAudioUrl = '';
              latestAudioPayload = null;
            } finally {
              isUploading = false;
              recordingFinalizationPromise = null;
              recordingStartedAtMs = 0;
              updatePermissionUI('post-upload');
              resolve();
            }
          };
        });

        mediaRecorder.start(RECORDER_TIMESLICE_MS);
        setStatus('Gravando..', 'recording');
        startBtn.disabled = true;
      } catch (err) {
        logError('Erro ao iniciar gravacao.', err);
        setStatus(`Erro: ${err.name}`, 'error');
        releaseActiveStream();
        isRecording = false;
        isUploading = false;
        recordingFinalizationPromise = null;
        recordingStartedAtMs = 0;
      }
    }

    function stopActiveRecording(reason = 'manual') {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        return waitForRecordingFinalization();
      }

      logInfo('Solicitando parada da gravacao.', reason);

      try {
        mediaRecorder.stop();
      } catch (err) {
        logError('Falha ao parar a gravacao.', err);
      }

      return waitForRecordingFinalization();
    }

    async function handleWidgetSubmit() {
      const status = document.getElementById('status-text');

      if (submitInProgress) {
        return;
      }

      submitInProgress = true;
      logInfo('Submit acionado pelo Jotform.');

      try {
        if (!hasRecordingStarted && !getCurrentWidgetValue()) {
          logInfo('Submit bloqueado: gravacao ainda nao iniciada.');
          if (status) setStatus('Inicie a gravacao para continuar.', 'error');
          JFCustomWidget.sendSubmit({
            valid: false,
            value: ''
          });
          return;
        }

        if (isRecording) {
          if (status) setStatus('Finalizando a gravacao antes do envio...', 'processing');
          await stopActiveRecording('submit');
        } else if (isUploading) {
          if (status) setStatus('Aguardando o audio ficar pronto...', 'processing');
          await waitForRecordingFinalization();
        }

        const submitValue = getCurrentWidgetValue();

        if (!submitValue) {
          logInfo('Nenhum audio disponivel no submit.');
          if (status) setStatus('Grave um audio antes de enviar.', 'error');
          JFCustomWidget.sendSubmit({
            valid: false,
            value: ''
          });
          return;
        }

        sendDataToParent({ value: submitValue }, 'submit-final');
        flushPendingSendData('submit-final');
        logInfo('Valor final enviado ao Jotform.', submitValue);
        JFCustomWidget.sendSubmit({
          valid: true,
          value: submitValue
        });
      } catch (err) {
        logError('Falha ao finalizar audio antes do envio.', err);
        if (status) setStatus('Erro ao finalizar audio. Tente novamente.', 'error');
        JFCustomWidget.sendSubmit({
          valid: false,
          value: getCurrentWidgetValue()
        });
      } finally {
        submitInProgress = false;
      }
    }

    // 2. onJotformReady global
    window.onJotformReady = function () {
      logInfo('onJotformReady chamado.');
      if (!window.JFCustomWidget || widgetSubscriptionsRegistered) return;

      widgetSubscriptionsRegistered = true;
      logInfo('Registrando eventos do Jotform.');

      JFCustomWidget.subscribe('ready', ({ value } = {}) => {
        logInfo('Evento ready recebido.', value);
        if (widgetInitialized) return;
        widgetInitialized = true;

        initializeControls();
        if (window.JFCustomWidget?.makeWidgetRequired) {
          try {
            window.JFCustomWidget.makeWidgetRequired();
            logInfo('Widget marcado como obrigatorio em runtime.');
          } catch (err) {
            logInfo('Nao foi possivel marcar widget como obrigatorio.', err?.message || err);
          }
        }

        const incomingValue = parseIncomingWidgetValue(value || '');
        const initialValue = incomingValue.rawValue || '';
        if (incomingValue.audioUrl) {
          hasRecordingStarted = true;
          latestAudioUrl = incomingValue.audioUrl;
          latestAudioPayload = incomingValue.payload;
          const status = document.getElementById('status-text');
          if (status) setStatus('Audio existente pronto para envio.', 'success');
        }

        sendDataToParent({ value: initialValue }, 'ready');
        flushPendingSendData('ready');
      });

      JFCustomWidget.subscribe('submit', () => {
        logInfo('Evento submit recebido.');
        handleWidgetSubmit().catch(err => {
          logError('Submit handler rejeitado.', err);
        });
      });

      flushPendingSendData('onJotformReady');
    };

    if (window.JFCustomWidget) {
      logInfo('JFCustomWidget detectado imediatamente.');
      window.onJotformReady();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        logInfo('DOMContentLoaded disparado.');
        enableJotformDiagnostics();
        initializeControls();
      });
    } else {
      logInfo('DOM pronto. Inicializando controles.');
      enableJotformDiagnostics();
      initializeControls();
    }

    const widgetSdkPoll = setInterval(() => {
      if (window.JFCustomWidget?.sendData) {
        logInfo('JFCustomWidget detectado via poll.');
        flushPendingSendData('poll');
        clearInterval(widgetSdkPoll);
        if (!widgetSubscriptionsRegistered) {
          window.onJotformReady();
        }
      }
    }, 250);
  </script>

  <style>
    :root {
      --bg-top: #f0fdf4;
      --bg-bottom: #eff6ff;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --border: #e2e8f0;
      --primary: #0f766e;
      --primary-strong: #115e59;
      --processing: #1d4ed8;
      --success: #14532d;
      --error: #b91c1c;
      --recording: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      background:
        radial-gradient(circle at top right, #dcfce7 0%, transparent 45%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    .container {
      width: min(100%, 360px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }

    h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      color: var(--text);
    }

    .subtitle {
      margin: 8px 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .permissions-stack {
      display: grid;
      gap: 10px;
    }

    .permission-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
      padding: 12px;
    }

    .permission-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .permission-copy {
      min-width: 0;
    }

    .permission-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .permission-help {
      margin: 3px 0 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .permission-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      margin-top: 4px;
      background: #d97706;
      animation: pulseDot 1.1s infinite;
      flex-shrink: 0;
    }

    .permission-dot[data-state='pending'] {
      background: #d97706;
      animation: pulseDot 1.1s infinite;
    }

    .permission-dot[data-state='checking'] {
      background: var(--processing);
      animation: pulseDot 1.1s infinite;
    }

    .permission-dot[data-state='granted'] {
      background: var(--success);
      animation: pulseDot 1.6s infinite;
    }

    .permission-dot[data-state='denied'] {
      background: var(--error);
      animation: none;
    }

    #recording-step {
      margin-top: 6px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .permission-card button {
      margin-top: 0;
    }

    button svg {
      margin-right: 8px;
    }

    button:hover:enabled {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
    }

    .btn-primary,
    .btn-success {
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
    }

    .btn-warning {
      color: #78350f;
      background: #fef3c7;
    }

    .btn-danger {
      color: #7f1d1d;
      background: #fee2e2;
    }

    .btn-granted {
      color: #14532d;
      background: #dcfce7;
    }

    .btn-granted:disabled {
      opacity: 1;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      box-shadow: none;
    }

    .status-card {
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 5px;
      background: #64748b;
      flex-shrink: 0;
    }

    #status-text {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 600;
      color: var(--text);
    }

    .status-card[data-tone='neutral'],
    .status-card[data-tone='ready'] {
      border-color: var(--border);
      background: var(--surface-soft);
    }

    .status-card[data-tone='neutral'] .status-dot,
    .status-card[data-tone='ready'] .status-dot {
      background: #64748b;
    }

    .status-card[data-tone='recording'] {
      border-color: #fcd34d;
      background: #fffbeb;
    }

    .status-card[data-tone='recording'] .status-dot {
      background: var(--recording);
      animation: pulseDot 1.1s infinite;
    }

    .status-card[data-tone='processing'] {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .status-card[data-tone='processing'] .status-dot {
      background: var(--processing);
      animation: pulseDot 1.3s infinite;
    }

    .status-card[data-tone='success'] {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .status-card[data-tone='success'] .status-dot {
      background: var(--success);
    }

    .status-card[data-tone='error'] {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .status-card[data-tone='error'] .status-dot {
      background: var(--error);
    }

    .hidden {
      display: none;
    }

    @keyframes pulseDot {
      0% {
        transform: scale(0.95);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.25);
        opacity: 0.5;
      }
      100% {
        transform: scale(0.95);
        opacity: 0.9;
      }
    }

    @media (max-width: 420px) {
      .container {
        padding: 16px;
        border-radius: 14px;
      }

      h3 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Gravador de Auditoria</h3>
    <p class="subtitle">Permita localizacao e microfone. A finalizacao e envio acontecem quando o formulario for submetido.</p>

    <div class="permissions-stack">
      <div class="permission-card">
        <div class="permission-head">
          <span id="locationPermissionDot" class="permission-dot" data-state="pending" aria-hidden="true"></span>
          <div class="permission-copy">
            <p class="permission-title">Localizacao</p>
            <p id="locationPermissionText" class="permission-help">Permissao pendente.</p>
          </div>
        </div>
        <button id="locationPermissionButton" class="btn-warning">Permitir localizacao</button>
      </div>

      <div class="permission-card">
        <div class="permission-head">
          <span id="microphonePermissionDot" class="permission-dot" data-state="pending" aria-hidden="true"></span>
          <div class="permission-copy">
            <p class="permission-title">Microfone</p>
            <p id="microphonePermissionText" class="permission-help">Permissao pendente.</p>
          </div>
        </div>
        <button id="microphonePermissionButton" class="btn-warning">Permitir microfone</button>
      </div>
    </div>

    <div id="recording-step" class="hidden">
      <button id="startButton" class="btn-success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
        Iniciar Gravacao
      </button>
    </div>

    <div id="status-card" class="status-card" data-tone="neutral">
      <span class="status-dot" aria-hidden="true"></span>
      <p id="status-text">Conceda localizacao e microfone para continuar.</p>
    </div>
  </div>

  <script src="https://js.jotform.com/JotFormCustomWidget.min.js?onload=onJotformReady"></script>
</body>
</html>
